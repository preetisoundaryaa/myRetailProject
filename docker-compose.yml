version: "3.9"

services:
  web:
    build: .
    container_name: retail-shelf-app
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      DEBUG: "true"
      LOG_LEVEL: DEBUG
    volumes:
      - ./:/app
    command: python -m app.main

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: retail-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - web

  grafana:
    image: grafana/grafana:11.1.4
    container_name: retail-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-polystat-panel
    depends_on:
      - prometheus
