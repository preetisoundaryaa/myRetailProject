apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retail-grafana
  template:
    metadata:
      labels:
        app: retail-grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.4
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_INSTALL_PLUGINS
              value: grafana-piechart-panel,grafana-polystat-panel
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: retail-grafana
spec:
  selector:
    app: retail-grafana
  ports:
    - port: 3000
      targetPort: 3000
