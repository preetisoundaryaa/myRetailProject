apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      scrape_timeout: 10s
      evaluation_interval: 1m

    scrape_configs:
      # Prometheus self-scrape
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      # Scrape retail-app pods
      - job_name: retail-app
        metrics_path: /metrics
        scheme: http
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Keep only pods labeled app=retail-app
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: retail-app
            action: keep
          # Replace pod IP with address + port
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8000
            action: replace

