apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retail-prometheus
  template:
    metadata:
      labels:
        app: retail-prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: retail-prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: retail-prometheus
spec:
  selector:
    app: retail-prometheus
  ports:
    - port: 9090
      targetPort: 9090
